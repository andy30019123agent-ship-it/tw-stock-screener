name: 每天盤後更新選股資料（全市場 · TWSE/TPEX 免費源）

on:
  schedule:
    - cron: '17 10 * * *'  # 每天 UTC 10:17 = 台北 18:17（避開整點壅塞）
  workflow_dispatch:
    inputs:
      bootstrap:
        description: '重建：產全市場清單 + 一次性回填歷史（首次或重置用）'
        type: boolean
        default: false
      sample:
        description: '測試用：只跑指定股票（逗號分隔）'
        required: false
        default: ''

permissions:
  contents: write

concurrency:
  group: daily-screener
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: （bootstrap）產全市場清單 + 回填歷史
        if: ${{ inputs.bootstrap }}
        run: |
          python pipeline/build_universe.py
          python pipeline/backfill.py --months 6 --chip-days 20 --sleep 0.4

      - name: 每日累積最新交易日（非 bootstrap）
        if: ${{ !inputs.bootstrap }}
        run: python pipeline/daily_update.py

      - name: 算指標、產出 screener.json + charts/
        env:
          SAMPLE: ${{ inputs.sample }}
        run: |
          if [ -n "$SAMPLE" ]; then
            python pipeline/build_data.py --sample "$SAMPLE"
          else
            python pipeline/build_data.py
          fi

      - name: 選股快報推播 Telegram（僅新交易日資料才推）
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
        run: python pipeline/notify_tg.py

      - name: 保存歷史與紀錄回 main（runner 會清空，這步是關鍵）
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pipeline/history/price.json pipeline/history/chip.json \
                  pipeline/holders_history.json pipeline/notify_state.json pipeline/universe.json
          if git diff --cached --quiet; then
            echo "無變動，略過"
          else
            git commit -m "chore: 更新全市場歷史與紀錄 [skip ci]"
            git push origin HEAD:main
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci
      - run: npm run build

      - name: 部署到 GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
